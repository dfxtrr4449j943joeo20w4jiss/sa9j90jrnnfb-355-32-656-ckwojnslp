<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>MultiStream Theater Ultimate</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230e0e10'/%3E%3Crect x='4' y='4' width='11' height='11' rx='2' fill='%239146ff'/%3E%3Crect x='17' y='4' width='11' height='11' rx='2' fill='%2353fc18'/%3E%3Crect x='4' y='17' width='11' height='11' rx='2' fill='%2353fc18'/%3E%3Crect x='17' y='17' width='11' height='11' rx='2' fill='%239146ff'/%3E%3C/svg%3E">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0e0e10; color: #efeff1; font-family: system-ui, sans-serif; display: flex; height: 100vh; overflow: hidden; }
        .main-layout { display: flex; width: 100vw; height: 100vh; position: relative; }

        .sidebar { width: 320px; background-color: #18181b; border-right: 2px solid #26262b; z-index: 10; transition: margin-left 0.3s; position: relative; }
        .sidebar.collapsed { margin-left: -320px; }
        .right-sidebar { border-right: none; border-left: 2px solid #26262b; transition: margin-right 0.3s; }
        .right-sidebar.collapsed { margin-right: -320px; margin-left: 0; }

        .sidebar-content { display: flex; flex-direction: column; gap: 8px; padding: 15px; height: 100%; overflow: hidden; box-sizing: border-box; }

        .toggle-btn { position: absolute; right: -25px; top: 50%; width: 25px; height: 50px; background: #18181b; border: 2px solid #26262b; border-left: none; color: white; cursor: pointer; z-index: 100; }
        .toggle-btn-right { position: absolute; left: -25px; top: 50%; width: 25px; height: 50px; background: #18181b; border: 2px solid #26262b; border-right: none; color: white; cursor: pointer; z-index: 100; }

        .list-header { font-size: 12px; color: #888; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 2px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; gap: 6px; }
        .collapse-trigger { cursor: pointer; display: flex; align-items: center; gap: 4px; flex: 1; min-width: 0; }

        .help-btn { width: 18px; height: 18px; border-radius: 50%; background: #26262b; border: 1px solid #3a3a3d; color: #999; font-size: 11px; font-weight: bold; cursor: help; display: flex; align-items: center; justify-content: center; padding: 0; flex-shrink: 0; }
        .help-btn:hover { background: #333; color: #fff; }

        .list-scroll-box { overflow-y: auto; overflow-x: hidden; }
        .list-scroll-box.resizable { min-height: 150px; height: 150px; flex-shrink: 0; resize: vertical; border: 1px solid #26262b; border-radius: 4px; }
        .list-scroll-box.grow { flex: 1 1 auto; min-height: 50px; }

        .btn-group { display: flex; gap: 5px; flex-shrink: 0; }
        .btn-sm { flex: 1; padding: 8px; background: #26262b; color: white; border: 1px solid #3a3a3d; cursor: pointer; border-radius: 4px; }
        .btn-sm.active { background: #53fc18; color: #000; font-weight: bold; }
        .btn-danger { background: #eb0400; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; }
        .btn-mute { background: #f39c12; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; }
        .manual-add-box { background-color: #1f1f23; padding: 10px; border-radius: 6px; border: 1px solid #26262b; display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
        input, select, button { background: #1f1f23; color: #fff; border: 1px solid #3a3a3d; padding: 8px; border-radius: 4px; font-family: inherit; }
        .btn-add { color: #000; font-weight: bold; cursor: pointer; border: none; }
        .btn-twitch { background: #9146ff; color: #fff; }
        .btn-kick { background: #53fc18; color: #000; }
        .hint-link { font-size: 11px; color: #888; text-decoration: none; }
        .hint-link:hover { color: #9146ff; }
        .hint-text { font-size: 11px; color: #666; line-height: 1.4; flex-shrink: 0; }

        .history-list { display: flex; flex-wrap: wrap; gap: 4px; }
        .history-chip { display: flex; align-items: center; background: #26262b; border: 1px solid #3a3a3d; border-radius: 12px; overflow: hidden; }
        .history-chip-label { background: transparent; border: none; color: #ccc; font-size: 11px; padding: 3px 6px 3px 8px; cursor: pointer; border-radius: 0; }
        .history-chip-label:hover { color: #fff; }
        .history-chip-remove { background: transparent; border: none; color: #888; font-size: 13px; line-height: 1; padding: 3px 7px 3px 3px; cursor: pointer; border-radius: 0; }
        .history-chip-remove:hover { color: #eb0400; }

        .auto-refresh-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-shrink: 0; }
        .auto-refresh-toggle { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #ccc; cursor: pointer; }
        .auto-refresh-toggle input { display: none; }
        .toggle-slider { width: 32px; height: 17px; background: #3a3a3d; border-radius: 999px; position: relative; transition: background 0.2s; flex-shrink: 0; }
        .toggle-slider::before { content: ''; position: absolute; width: 13px; height: 13px; border-radius: 50%; background: #fff; top: 2px; left: 2px; transition: transform 0.2s; }
        .auto-refresh-toggle input:checked + .toggle-slider { background: #9146ff; }
        .auto-refresh-toggle input:checked + .toggle-slider::before { transform: translateX(15px); }
        #autoRefreshCountdown { white-space: nowrap; }

        .platform-badge { display: inline-flex; align-items: center; justify-content: center; width: 14px; height: 14px; border-radius: 50%; font-size: 9px; font-weight: bold; flex-shrink: 0; line-height: 1; }
        .platform-badge.platform-twitch { background: #9146ff; color: #fff; }
        .platform-badge.platform-kick { background: #53fc18; color: #000; }

        .saved-channel { background: #26262b; padding: 8px; margin-bottom: 5px; cursor: pointer; border-radius: 4px; display: flex; align-items: center; gap: 8px; text-decoration: none; color: inherit; }
        .saved-channel .left-group { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; }
        .saved-channel .name-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; flex: 1; min-width: 0; }
        .stream-thumb { width: 80px; height: 45px; object-fit: cover; border-radius: 3px; flex-shrink: 0; background: #000; cursor: pointer; }

        #thumbPreview { position: fixed; right: 330px; width: 320px; height: 180px; border: 2px solid #9146ff; border-radius: 6px; overflow: hidden; z-index: 999; pointer-events: none; box-shadow: 0 4px 20px rgba(0,0,0,0.6); display: none; background: #000; }
        #thumbPreview img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .list-item { background: #26262b; padding: 6px; margin-bottom: 3px; font-size: 13px; border-radius: 3px; }

        .status-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; background: #555; }
        .status-dot.live { background: #53fc18; box-shadow: 0 0 4px #53fc18; }
        .status-dot.offline { background: #eb0400; }
        .status-dot.unknown { background: #444; border: 1px solid #666; }
        .status-dot.category-mismatch { background: #f3c611; box-shadow: 0 0 4px #f3c611; }

        .grid-container { flex-grow: 1; display: grid; gap: 12px; padding: 12px; }
        .stream-slot { background: #1f1f23; border: 2px dashed #3a3a3d; border-radius: 8px; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .stream-slot.active { border: 2px solid #26262b; }
        .slot-controls { position: absolute; top: 5px; left: 5px; z-index: 20; display: none; gap: 5px; background: rgba(0,0,0,0.6); padding: 4px; border-radius: 4px; align-items: center; }
        .stream-slot:hover .slot-controls { display: flex; }
        .drag-handle { background: #333; padding: 2px 8px; cursor: grab; color: white; border-radius: 4px; user-select: none; }
        .close-btn { background: #eb0400; color: white; border: none; padding: 2px 8px; border-radius: 4px; cursor: pointer; }
        .heart-btn { background: transparent; border: none; color: #999; font-size: 16px; cursor: pointer; padding: 0 6px; line-height: 1; }
        .heart-btn.favorited { color: #eb0400; }

        .stream-wrapper { width: 100%; height: 100%; display: flex; position: relative; }
        .stream-label { position: absolute; top: 0; right: 0; background: rgba(0,0,0,0.8); padding: 4px 8px; color: #53fc18; font-weight: bold; pointer-events: none; z-index: 5; opacity: 0; transition: opacity 0.2s; display: flex; align-items: center; gap: 4px; }
        .stream-slot:hover .stream-label { opacity: 1; }
        iframe { width: 100%; height: 100%; border: none; }

        body.dragging-active iframe { pointer-events: none; }
    </style>
</head>
<body>
    <div id="thumbPreview"><img src="" alt=""></div>

    <div class="main-layout">
        <div class="sidebar" id="sidebar">
            <button class="toggle-btn" id="toggleBtn" onclick="toggleSidebar()">◀</button>
            <div class="sidebar-content">
                <div class="btn-group">
                    <button id="btn-1" class="btn-sm" onclick="changeGridMode(1)">1x1</button>
                    <button id="btn-2" class="btn-sm" onclick="changeGridMode(2)">2x2</button>
                    <button id="btn-3" class="btn-sm" onclick="changeGridMode(3)">3x3</button>
                </div>
                <div style="display: flex; gap: 5px; flex-shrink: 0;">
                    <button class="btn-danger" style="flex: 1;" onclick="clearAll()">Nollaa</button>
                    <button class="btn-mute" style="flex: 1;" onclick="muteAll()">Mute All</button>
                </div>
                <div class="manual-add-box">
                    <select id="platform" onchange="updateAddButtonColor()">
                        <option value="kick">Kick</option>
                        <option value="twitch">Twitch</option>
                    </select>
                    <input type="text" id="channelInput" placeholder="Nimi..." onkeydown="if(event.key === 'Enter') { event.preventDefault(); processNewChannel(); }">
                    <button class="btn-add btn-kick" id="addChannelBtn" onclick="processNewChannel()">Lisää</button>
                </div>

                <div class="list-header"><span class="collapse-trigger" onclick="toggleActiveList()">Aktiiviset striimit (1-9) <span id="toggleIcon">▼</span></span></div>
                <div id="activeContent" class="list-scroll-box resizable"><div id="activeList"></div></div>

                <div class="list-header"><span class="collapse-trigger" onclick="toggleCollapsible('twitchListWrap','twitchToggleIcon')">Tallennetut kanavat - Twitch <span id="twitchToggleIcon">▼</span></span></div>
                <div id="twitchListWrap" class="list-scroll-box resizable"><div id="channelListTwitch"></div></div>

                <div class="list-header"><span class="collapse-trigger" onclick="toggleCollapsible('kickListWrap','kickToggleIcon')">Tallennetut kanavat - Kick <span id="kickToggleIcon">▼</span></span></div>
                <div id="kickListWrap" class="list-scroll-box resizable"><div id="channelListKick"></div></div>
            </div>
        </div>

        <div class="grid-container" id="streamGrid"></div>

        <div class="sidebar right-sidebar" id="rightSidebar">
            <button class="toggle-btn-right" id="toggleBtnRight" onclick="toggleRightSidebar()">▶</button>
            <div class="sidebar-content">

                <div class="list-header">
                    <span class="collapse-trigger" onclick="toggleCollapsible('twitchCredsBody','twitchCredsIcon')">Twitch-tunnukset <span id="twitchCredsIcon">▼</span></span>
                </div>
                <div id="twitchCredsBody">
                    <div class="manual-add-box">
                        <input type="password" id="twitchClientId" placeholder="Client-ID">
                        <input type="password" id="twitchToken" placeholder="Access Token">
                        <button class="btn-add btn-twitch" onclick="saveTwitchCreds()">Tallenna tunnukset</button>
                        <a class="hint-link" href="https://dev.twitch.tv/console/apps" target="_blank" rel="noopener">Luo Client-ID Twitchin kehittäjäkonsolissa →</a>
                    </div>
                </div>

                <div class="list-header">
                    <span class="collapse-trigger" onclick="toggleCollapsible('liveStatusBody','liveStatusIcon')">Live-tilat (Twitch) <span id="liveStatusIcon">▼</span></span>
                    <button type="button" class="help-btn" title="Päivittää automaattisesti myös auki olevan kategoriahaun tulokset.&#10;&#10;Automaattinen täyttö: korvaa tyhjät tai offline-tilaan menneet paikat seuraavalla livenä olevalla tallennetulla Twitch-kanavalla (eniten katsojia ensin). Itse suljettu kanava jätetään väliin ~5 minuutiksi ettei se palaa heti takaisin. Vaatii Automaattisen päivityksen päällä.&#10;&#10;Suosi vain haettuja kategorioita: automaattitäyttö valitsee UUDEKSI striimiksi vain kanavia joiden nykyinen peli löytyy kategoriahaun historiasta. Ei sulje jo pyörivää striimiä vaikka pelaaja vaihtaisi kategoriaa kesken kaiken - tarkistus tehdään vain uutta paikkaa valittaessa.">?</button>
                    <button class="btn-sm btn-twitch" style="flex:none; padding:4px 8px; font-size:11px;" onclick="refreshTwitchLiveStatus()">Päivitä</button>
                </div>
                <div id="liveStatusBody">
                    <div class="auto-refresh-row">
                        <label class="auto-refresh-toggle">
                            <input type="checkbox" id="autoRefreshToggle" checked onchange="onAutoRefreshToggleChange()">
                            <span class="toggle-slider"></span>
                            <span>Automaattinen päivitys</span>
                        </label>
                        <span id="autoRefreshCountdown" class="hint-text"></span>
                    </div>
                    <div class="auto-refresh-row">
                        <label class="auto-refresh-toggle">
                            <input type="checkbox" id="autoFillToggle" onchange="onAutoFillToggleChange()">
                            <span class="toggle-slider"></span>
                            <span>Täytä paikat automaattisesti</span>
                        </label>
                    </div>
                    <div class="auto-refresh-row">
                        <label class="auto-refresh-toggle">
                            <input type="checkbox" id="categoryFilterToggle" onchange="onCategoryFilterToggleChange()">
                            <span class="toggle-slider"></span>
                            <span>Suosi vain haettuja kategorioita</span>
                        </label>
                    </div>
                </div>

                <div class="list-header">
                    <span class="collapse-trigger" onclick="toggleCollapsible('backupBody','backupIcon')">Asetusten varmuuskopiointi <span id="backupIcon">▼</span></span>
                    <button type="button" class="help-btn" title="Sisältää mm. tallennetut kanavat ja Twitch-tunnukset selkokielisenä tiedostossa — säilytä tiedostoa varovasti äläkä jaa sitä muille.">?</button>
                </div>
                <div id="backupBody">
                    <div class="manual-add-box">
                        <div style="display:flex; gap:6px;">
                            <button class="btn-sm" style="flex:1;" onclick="exportSettings()">Vie asetukset</button>
                            <button class="btn-sm" style="flex:1;" onclick="triggerImportFile()">Tuo asetukset</button>
                        </div>
                        <input type="file" id="importFileInput" accept="application/json" style="display:none;" onchange="importSettings(event)">
                    </div>
                </div>

                <div class="list-header">
                    <span class="collapse-trigger" onclick="toggleCollapsible('categorySearchBody','categorySearchIcon')">Selaa kategoriaa (Twitch) <span id="categorySearchIcon">▼</span></span>
                </div>
                <div id="categorySearchBody">
                    <div class="manual-add-box">
                        <input type="text" id="categoryInput" placeholder="Esim. Just Chatting, VRChat..." onkeydown="if(event.key === 'Enter'){ event.preventDefault(); searchTwitchCategory(); }">
                        <button class="btn-add btn-twitch" onclick="searchTwitchCategory()">Hae livenä olevat</button>
                        <div class="history-list" id="categoryHistoryList"></div>
                    </div>
                </div>

                <div id="categoryResults" class="list-scroll-box grow" style="font-size:13px; color:#888;"></div>
            </div>
        </div>
    </div>

    <script>
        const VALID_GRID_MODES = [1, 2, 3];
        const storedGridMode = parseInt(localStorage.getItem('gridMode'));
        let gridMode = VALID_GRID_MODES.includes(storedGridMode) ? storedGridMode : 3;

        let savedChannels = [];
        try {
            const raw = JSON.parse(localStorage.getItem('myChannels'));
            if (Array.isArray(raw)) savedChannels = raw;
        } catch (e) { savedChannels = []; }

        savedChannels = savedChannels.map(c => ({
            name: c.name,
            plat: c.plat,
            lastClosedLiveAt: c.lastClosedLiveAt || 0,
            isLive: (typeof c.isLive === 'boolean') ? c.isLive : null,
            viewerCount: (typeof c.viewerCount === 'number') ? c.viewerCount : null,
            gameName: (typeof c.gameName === 'string') ? c.gameName : null
        }));

        let twitchCreds = { clientId: '', token: '' };
        try {
            const rawCreds = JSON.parse(localStorage.getItem('twitchCreds'));
            if (rawCreds) twitchCreds = rawCreds;
        } catch (e) { twitchCreds = { clientId: '', token: '' }; }

        let categoryHistory = [];
        try {
            const rawHist = JSON.parse(localStorage.getItem('categoryHistory'));
            if (Array.isArray(rawHist)) categoryHistory = rawHist;
        } catch (e) { categoryHistory = []; }

        // visualOrder[visuaalinenPaikka] = fyysinen slot-indeksi joka renderöityy siihen paikkaan.
        // Fyysiset .stream-slot -elementit EIVÄT KOSKAAN liiku DOM-puussa - vain tämä järjestys muuttuu,
        // ja järjestys toteutetaan CSS order -ominaisuudella. Näin iframeä ei ikinä siirretä/ladata uudelleen raahauksessa.
        let visualOrder = [0, 1, 2, 3, 4, 5, 6, 7, 8];
        try {
            const storedOrder = JSON.parse(localStorage.getItem('visualOrder'));
            if (Array.isArray(storedOrder) && storedOrder.length === 9) {
                const asSet = new Set(storedOrder);
                if (asSet.size === 9 && [...asSet].every(v => Number.isInteger(v) && v >= 0 && v <= 8)) {
                    visualOrder = storedOrder;
                }
            }
        } catch (e) { /* pidetään oletusjärjestys */ }

        let slots = [];
        let lastCategoryQuery = '';

        let autoRefreshEnabled = true;
        try {
            const storedAR = localStorage.getItem('autoRefreshEnabled');
            autoRefreshEnabled = storedAR === null ? true : storedAR === 'true';
        } catch (e) { autoRefreshEnabled = true; }
        let autoRefreshSecondsLeft = 120;

        let autoFillEnabled = false;
        try {
            autoFillEnabled = localStorage.getItem('autoFillEnabled') === 'true';
        } catch (e) { autoFillEnabled = false; }

        let categoryFilterEnabled = false;
        try {
            categoryFilterEnabled = localStorage.getItem('categoryFilterEnabled') === 'true';
        } catch (e) { categoryFilterEnabled = false; }

        function persistSavedChannels() {
            localStorage.setItem('myChannels', JSON.stringify(savedChannels));
        }

        // ---------- Visuaalinen järjestys (order-pohjainen, ei DOM-siirtoja) ----------

        function applyVisualOrder() {
            visualOrder.forEach((physicalIdx, visualPos) => {
                slots[physicalIdx].style.order = visualPos;
            });
        }

        function getVisualPos(physicalIdx) {
            return visualOrder.indexOf(physicalIdx);
        }

        function updateSlotNumbering() {
            slots.forEach((s, physicalIdx) => {
                if (!s.dataset.name) return;
                const labelText = s.querySelector('.stream-label-text');
                if (labelText) {
                    const vp = getVisualPos(physicalIdx);
                    labelText.textContent = `${vp + 1}. ${s.dataset.name}`;
                }
            });
        }

        // ---------- Alustaikonit (ei virallisia logoja - värilliset kirjainmerkit) ----------

        function createPlatformBadge(plat) {
            const badge = document.createElement('span');
            badge.className = 'platform-badge ' + (plat === 'twitch' ? 'platform-twitch' : 'platform-kick');
            badge.textContent = plat === 'twitch' ? 'T' : 'K';
            badge.title = plat === 'twitch' ? 'Twitch' : 'Kick';
            return badge;
        }

        function createStreamLabel(physicalIdx, name, plat) {
            const label = document.createElement('div');
            label.className = 'stream-label';
            label.appendChild(createPlatformBadge(plat));
            const textSpan = document.createElement('span');
            textSpan.className = 'stream-label-text';
            const vp = getVisualPos(physicalIdx);
            textSpan.textContent = `${vp + 1}. ${name}`;
            label.appendChild(textSpan);
            return label;
        }

        // ---------- Lisää-napin väri alustan mukaan ----------

        function updateAddButtonColor() {
            const plat = document.getElementById('platform').value;
            const btn = document.getElementById('addChannelBtn');
            if (plat === 'twitch') {
                btn.classList.remove('btn-kick');
                btn.classList.add('btn-twitch');
            } else {
                btn.classList.remove('btn-twitch');
                btn.classList.add('btn-kick');
            }
        }

        // ---------- Laatikoiden koon muistaminen ----------

        function setupResizablePersistence(elId, storageKey) {
            const el = document.getElementById(elId);
            const stored = parseInt(localStorage.getItem(storageKey));
            if (stored && stored >= 150) {
                el.style.height = stored + 'px';
            }
            const observer = new ResizeObserver(entries => {
                for (const entry of entries) {
                    const h = Math.round(entry.contentRect.height);
                    if (h >= 100) {
                        localStorage.setItem(storageKey, h);
                    }
                }
            });
            observer.observe(el);
        }

        // ---------- Kokoontaitettavat osiot ----------

        function toggleCollapsible(contentId, iconId) {
            const content = document.getElementById(contentId);
            const icon = document.getElementById(iconId);
            content.style.display = content.style.display === 'none' ? 'block' : 'none';
            icon.innerText = content.style.display === 'none' ? '▲' : '▼';
        }

        function toggleActiveList() { toggleCollapsible('activeContent', 'toggleIcon'); }

        // ---------- Isompi esikatselukuva hiiren päällä ----------

        function showThumbPreview(e, imgUrl) {
            const preview = document.getElementById('thumbPreview');
            preview.querySelector('img').src = imgUrl;
            const rect = e.currentTarget.getBoundingClientRect();
            let top = rect.top + (rect.height / 2) - 90;
            top = Math.max(10, Math.min(top, window.innerHeight - 190));
            preview.style.top = top + 'px';
            preview.style.display = 'block';
        }

        function hideThumbPreview() {
            document.getElementById('thumbPreview').style.display = 'none';
        }

        // ---------- Slottien ohjauspainikkeet ----------

        function buildEmptyControls(idx) {
            const controls = document.createElement('div');
            controls.className = 'slot-controls';
            const handle = document.createElement('div');
            handle.className = 'drag-handle';
            handle.draggable = true;
            handle.textContent = '☰';
            handle.title = 'Siirrä';
            handle.addEventListener('dragstart', (e) => drag(e, idx));
            handle.addEventListener('dragend', dragEnd);
            controls.appendChild(handle);
            return controls;
        }

        function buildActiveControls(idx, name, plat) {
            const controls = document.createElement('div');
            controls.className = 'slot-controls';

            const handle = document.createElement('div');
            handle.className = 'drag-handle';
            handle.draggable = true;
            handle.textContent = '☰';
            handle.title = 'Siirrä striimi';
            handle.addEventListener('dragstart', (e) => drag(e, idx));
            handle.addEventListener('dragend', dragEnd);
            controls.appendChild(handle);

            const heart = document.createElement('button');
            heart.className = 'heart-btn';
            heart.textContent = '♥';
            heart.title = 'Lisää/poista tallennetuista kanavista';
            const isSaved = savedChannels.some(c => c.name === name && c.plat === plat);
            heart.classList.toggle('favorited', isSaved);
            heart.addEventListener('click', () => toggleSavedFromPlayer(name, plat, heart));
            controls.appendChild(heart);

            const closeBtn = document.createElement('button');
            closeBtn.className = 'close-btn';
            closeBtn.textContent = 'X';
            closeBtn.title = 'Sulje striimi';
            closeBtn.addEventListener('click', () => clearSlot(idx));
            controls.appendChild(closeBtn);

            return controls;
        }

        function toggleSavedFromPlayer(name, plat, btnEl) {
            const idx = savedChannels.findIndex(c => c.name === name && c.plat === plat);
            if (idx === -1) {
                savedChannels.push({ name, plat, lastClosedLiveAt: 0, isLive: null, viewerCount: null, gameName: null });
                if (btnEl) btnEl.classList.add('favorited');
            } else {
                savedChannels.splice(idx, 1);
                if (btnEl) btnEl.classList.remove('favorited');
            }
            persistSavedChannels();
            renderSavedList();
        }

        // ---------- Slottien alustus ----------

        function initSlots() {
            const container = document.getElementById('streamGrid');
            container.innerHTML = "";
            slots = [];
            for (let i = 0; i < 9; i++) {
                const slot = document.createElement('div');
                slot.className = 'stream-slot';
                slot.id = 'slot-' + i;
                slot.ondragover = e => e.preventDefault();
                slot.ondrop = drop;
                slot.appendChild(buildEmptyControls(i));
                const freeBtn = document.createElement('button');
                freeBtn.textContent = 'Vapaa';
                slot.appendChild(freeBtn);
                container.appendChild(slot);
                slots.push(slot);
            }
            applyVisualOrder();
            updateGridDisplay();
            renderLists();
            restoreStreams();
            updateSlotNumbering();
        }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('collapsed');
            document.getElementById('toggleBtn').innerText = sb.classList.contains('collapsed') ? ">" : "<";
        }

        function toggleRightSidebar() {
            const sb = document.getElementById('rightSidebar');
            sb.classList.toggle('collapsed');
            document.getElementById('toggleBtnRight').innerText = sb.classList.contains('collapsed') ? '◀' : '▶';
        }

        // ---------- Listojen renderöinti ----------

        function updateLists() {
            const activeList = document.getElementById('activeList');
            activeList.innerHTML = "";
            visualOrder.forEach((physicalIdx, visualPos) => {
                const s = slots[physicalIdx];
                if (s && s.dataset.name) {
                    const item = document.createElement('div');
                    item.className = 'list-item';
                    item.textContent = `${visualPos + 1}. ${s.dataset.name}`;
                    activeList.appendChild(item);
                }
            });
            renderSavedList();
        }

        function sortSavedChannels(list) {
            return [...list].sort((a, b) => {
                const aLive = a.isLive === true ? 1 : 0;
                const bLive = b.isLive === true ? 1 : 0;
                if (aLive !== bLive) return bLive - aLive;

                const aOff = a.isLive === false ? 1 : 0;
                const bOff = b.isLive === false ? 1 : 0;
                if (aOff !== bOff) return aOff - bOff;

                const aTime = a.lastClosedLiveAt || 0;
                const bTime = b.lastClosedLiveAt || 0;
                if (aTime !== bTime) return bTime - aTime;

                return a.name.localeCompare(b.name);
            });
        }

        function getDotStatus(c) {
            if (c.plat === 'kick') {
                return { cls: 'unknown', title: 'Kick: live-tila ei tiedossa ilman OAuth-kirjautumista' };
            }
            if (c.isLive === null) {
                return { cls: 'unknown', title: "Paina 'Päivitä' hakeaksesi live-tilan Twitchistä" };
            }
            if (c.isLive === false) {
                return { cls: 'offline', title: 'Ei livenä' };
            }
            if (categoryHistory.length > 0 && c.gameName) {
                const matches = categoryHistory.some(h => h.toLowerCase() === c.gameName.toLowerCase());
                if (matches) return { cls: 'live', title: `Livenä – kategoria täsmää (${c.gameName})` };
                return { cls: 'category-mismatch', title: `Livenä, mutta eri kategoriassa: ${c.gameName}` };
            }
            return { cls: 'live', title: c.gameName ? `Livenä – ${c.gameName}` : 'Livenä' };
        }

        function renderSavedList() {
            const activeNames = slots.map(s => s.dataset.name);
            const visible = savedChannels.filter(c => !activeNames.includes(c.name));
            renderSavedListForPlatform(visible.filter(c => c.plat === 'twitch'), 'channelListTwitch');
            renderSavedListForPlatform(visible.filter(c => c.plat === 'kick'), 'channelListKick');
        }

        function renderSavedListForPlatform(list, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            const sorted = sortSavedChannels(list);

            sorted.forEach(c => {
                const row = document.createElement('div');
                row.className = 'saved-channel';

                const left = document.createElement('span');
                left.className = 'left-group';

                left.appendChild(createPlatformBadge(c.plat));

                const dot = document.createElement('span');
                const status = getDotStatus(c);
                dot.className = 'status-dot ' + status.cls;
                dot.title = status.title;
                left.appendChild(dot);

                const nameSpan = document.createElement('span');
                nameSpan.className = 'name-text';
                nameSpan.textContent = (c.isLive === true && typeof c.viewerCount === 'number')
                    ? `${c.name} (${c.viewerCount.toLocaleString('fi-FI')})`
                    : c.name;
                left.appendChild(nameSpan);

                row.appendChild(left);

                const closeBtn = document.createElement('button');
                closeBtn.className = 'close-btn';
                closeBtn.textContent = 'X';
                closeBtn.addEventListener('click', (e) => deleteCh(c.name, e));
                row.appendChild(closeBtn);

                row.addEventListener('click', () => processNewChannelManual(c.name, c.plat));

                container.appendChild(row);
            });
        }

        function renderLists() { updateLists(); renderSavedList(); }

        // ---------- Layoutin tallennus/palautus ----------

        function saveLayout() {
            let layout = {};
            slots.forEach((s, i) => {
                if (s.dataset.name) layout[i] = { name: s.dataset.name, plat: s.dataset.plat };
            });
            localStorage.setItem('activeLayout', JSON.stringify(layout));
            localStorage.setItem('visualOrder', JSON.stringify(visualOrder));
            updateLists();
        }

        function restoreStreams() {
            let layout = null;
            try { layout = JSON.parse(localStorage.getItem('activeLayout')); } catch (e) { layout = null; }
            if (!layout) return;
            for (let i in layout) loadStreamIntoSlot(i, layout[i].name, layout[i].plat);
        }

        // ---------- Striimin lataus ----------

        function loadStreamIntoSlot(idx, name, plat) {
            idx = parseInt(idx);
            const url = plat === 'twitch'
                ? `https://player.twitch.tv/?channel=${encodeURIComponent(name)}&parent=${window.location.hostname}&muted=true`
                : `https://player.kick.com/${encodeURIComponent(name)}?muted=true`;

            slots[idx].dataset.name = name;
            slots[idx].dataset.plat = plat;
            slots[idx].innerHTML = '';
            slots[idx].appendChild(buildActiveControls(idx, name, plat));

            const wrapper = document.createElement('div');
            wrapper.className = 'stream-wrapper';

            wrapper.appendChild(createStreamLabel(idx, name, plat));

            const iframe = document.createElement('iframe');
            iframe.src = url;
            // Huom: picture-in-picture EI ole enää sallittu -> selain ei näytä automaattista PiP-kuvaketta hoveroidessa
            iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-presentation');
            iframe.setAttribute('allow', 'autoplay; encrypted-media');
            iframe.setAttribute('referrerpolicy', 'no-referrer');
            wrapper.appendChild(iframe);

            slots[idx].appendChild(wrapper);
            slots[idx].classList.add('active');
            updateLists();
        }

        // ---------- Ruudukkokoko ----------

        function updateGridDisplay() {
            const container = document.getElementById('streamGrid');
            container.style.gridTemplateColumns = `repeat(${gridMode}, 1fr)`;
            container.style.gridTemplateRows = `repeat(${gridMode}, 1fr)`;
            document.querySelectorAll('.btn-sm').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + gridMode).classList.add('active');
            slots.forEach((s, physicalIdx) => {
                const vp = getVisualPos(physicalIdx);
                s.style.display = vp < gridMode * gridMode ? 'flex' : 'none';
            });
        }

        function changeGridMode(val) {
            if (!VALID_GRID_MODES.includes(val)) return;
            const oldVisibleCount = gridMode * gridMode;
            gridMode = val;
            localStorage.setItem('gridMode', val);
            const newVisibleCount = gridMode * gridMode;
            updateGridDisplay();

            if (newVisibleCount > oldVisibleCount) {
                slots.forEach((s, physicalIdx) => {
                    const vp = getVisualPos(physicalIdx);
                    if (vp >= oldVisibleCount && vp < newVisibleCount && s.dataset.name) {
                        loadStreamIntoSlot(physicalIdx, s.dataset.name, s.dataset.plat);
                    }
                });
            }
        }

        function muteAll() {
            slots.forEach((s, i) => {
                if (!s.dataset.name) return;
                loadStreamIntoSlot(i, s.dataset.name, s.dataset.plat);
            });
        }

        // ---------- Raahaus: VAIN visuaalisen järjestyksen vaihto, ei koskaan DOM-siirtoa ----------

        function drag(e, i) {
            e.dataTransfer.setData("src", i);
            document.body.classList.add('dragging-active');
        }

        function dragEnd(e) {
            document.body.classList.remove('dragging-active');
        }

        function drop(e) {
            e.preventDefault();
            document.body.classList.remove('dragging-active');
            const srcIdx = parseInt(e.dataTransfer.getData("src"));
            const target = e.target.closest('.stream-slot');
            if (!target) return;
            const targetIdx = parseInt(target.id.split('-')[1]);
            if (isNaN(srcIdx) || srcIdx === targetIdx) return;

            const srcHasStream = !!slots[srcIdx].dataset.name;
            const targetHasStream = !!slots[targetIdx].dataset.name;
            if (!srcHasStream && !targetHasStream) return;

            const srcVisualPos = getVisualPos(srcIdx);
            const targetVisualPos = getVisualPos(targetIdx);
            visualOrder[srcVisualPos] = targetIdx;
            visualOrder[targetVisualPos] = srcIdx;

            applyVisualOrder();
            updateGridDisplay();
            updateSlotNumbering();
            saveLayout();
        }

        // ---------- Kanavien lisäys / poisto ----------

        function processNewChannel() {
            const input = document.getElementById('channelInput');
            const name = input.value.trim().toLowerCase();
            const plat = document.getElementById('platform').value;
            if (!name) return;
            if (!savedChannels.find(c => c.name === name)) {
                savedChannels.push({ name, plat, lastClosedLiveAt: 0, isLive: null, viewerCount: null, gameName: null });
                persistSavedChannels();
            }
            for (let i = 0; i < slots.length; i++) {
                if (!slots[i].classList.contains('active')) {
                    loadStreamIntoSlot(i, name, plat);
                    saveLayout();
                    break;
                }
            }
            input.value = "";
        }

        function processNewChannelManual(name, plat) {
            for (let i = 0; i < slots.length; i++) {
                if (!slots[i].classList.contains('active')) {
                    loadStreamIntoSlot(i, name, plat);
                    saveLayout();
                    return;
                }
            }
        }

        function loadFromCategorySearch(name, plat) {
            for (let i = 0; i < slots.length; i++) {
                if (!slots[i].classList.contains('active')) {
                    loadStreamIntoSlot(i, name, plat);
                    saveLayout();
                    return true;
                }
            }
            alert('Kaikki 9 paikkaa ovat käytössä. Vapauta jokin paikka ensin.');
            return false;
        }

        function deleteCh(name, e) {
            e.stopPropagation();
            if (confirm("Oletko varma, että haluat poistaa kanavan " + name + " tallennetuista?")) {
                savedChannels = savedChannels.filter(c => c.name !== name);
                persistSavedChannels();
                renderLists();
            }
        }

        function clearSlot(i) {
            const name = slots[i].dataset.name;
            const plat = slots[i].dataset.plat;
            if (name) {
                const entry = savedChannels.find(c => c.name === name && c.plat === plat);
                if (entry && entry.isLive !== false) {
                    entry.lastClosedLiveAt = Date.now();
                    persistSavedChannels();
                }
            }
            slots[i].innerHTML = '';
            slots[i].appendChild(buildEmptyControls(i));
            const freeBtn = document.createElement('button');
            freeBtn.textContent = 'Vapaa';
            slots[i].appendChild(freeBtn);
            slots[i].classList.remove('active');
            delete slots[i].dataset.name;
            delete slots[i].dataset.plat;
            saveLayout();
        }

        function clearAll() {
            slots.forEach((s, i) => clearSlot(i));
            localStorage.removeItem('activeLayout');
            visualOrder = [0, 1, 2, 3, 4, 5, 6, 7, 8];
            applyVisualOrder();
            updateGridDisplay();
            saveLayout();
        }

        // ---------- Automaattinen täyttö ----------

        function runAutoFill() {
            const cooldownMs = 5 * 60 * 1000;
            const now = Date.now();

            slots.forEach((s, i) => {
                if (s.style.display === 'none') return;

                const isEmpty = !s.dataset.name;
                let isOfflineTwitch = false;
                if (!isEmpty && s.dataset.plat === 'twitch') {
                    const entry = savedChannels.find(c => c.name === s.dataset.name && c.plat === 'twitch');
                    isOfflineTwitch = !!(entry && entry.isLive === false);
                }

                if (!isEmpty && !isOfflineTwitch) return;

                const excludeNames = slots.map(sl => sl.dataset.name).filter(Boolean);
                const candidates = savedChannels.filter(c => {
                    if (c.plat !== 'twitch') return false;
                    if (c.isLive !== true) return false;
                    if (excludeNames.includes(c.name)) return false;
                    if ((now - (c.lastClosedLiveAt || 0)) <= cooldownMs) return false;
                    if (categoryFilterEnabled) {
                        const matches = c.gameName && categoryHistory.some(h => h.toLowerCase() === c.gameName.toLowerCase());
                        if (!matches) return false;
                    }
                    return true;
                });
                candidates.sort((a, b) => (b.viewerCount || 0) - (a.viewerCount || 0));
                const candidate = candidates[0];

                if (candidate) {
                    loadStreamIntoSlot(i, candidate.name, candidate.plat);
                    saveLayout();
                }
            });
        }

        function onAutoFillToggleChange() {
            autoFillEnabled = document.getElementById('autoFillToggle').checked;
            localStorage.setItem('autoFillEnabled', autoFillEnabled);
            if (autoFillEnabled) {
                refreshTwitchLiveStatus(true);
            }
        }

        function onCategoryFilterToggleChange() {
            categoryFilterEnabled = document.getElementById('categoryFilterToggle').checked;
            localStorage.setItem('categoryFilterEnabled', categoryFilterEnabled);
        }

        // ---------- Twitch API: tunnukset, hakuhistoria, kategoriahaku, live-tilan päivitys ----------

        function saveTwitchCreds() {
            twitchCreds.clientId = document.getElementById('twitchClientId').value.trim();
            twitchCreds.token = document.getElementById('twitchToken').value.trim();
            localStorage.setItem('twitchCreds', JSON.stringify(twitchCreds));
            alert('Twitch-tunnukset tallennettu selaimen muistiin.');
        }

        function addToCategoryHistory(term) {
            const clean = term.trim();
            if (!clean) return;
            categoryHistory = categoryHistory.filter(t => t.toLowerCase() !== clean.toLowerCase());
            categoryHistory.unshift(clean);
            if (categoryHistory.length > 15) categoryHistory = categoryHistory.slice(0, 15);
            localStorage.setItem('categoryHistory', JSON.stringify(categoryHistory));
            renderCategoryHistory();
        }

        function renderCategoryHistory() {
            const box = document.getElementById('categoryHistoryList');
            box.innerHTML = '';
            categoryHistory.forEach(term => {
                const chip = document.createElement('span');
                chip.className = 'history-chip';

                const label = document.createElement('button');
                label.type = 'button';
                label.className = 'history-chip-label';
                label.textContent = term;
                label.addEventListener('click', () => {
                    document.getElementById('categoryInput').value = term;
                });
                chip.appendChild(label);

                const removeBtn = document.createElement('button');
                removeBtn.type = 'button';
                removeBtn.className = 'history-chip-remove';
                removeBtn.textContent = '×';
                removeBtn.title = 'Poista hakuhistoriasta';
                removeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    categoryHistory = categoryHistory.filter(t => t !== term);
                    localStorage.setItem('categoryHistory', JSON.stringify(categoryHistory));
                    renderCategoryHistory();
                });
                chip.appendChild(removeBtn);

                box.appendChild(chip);
            });
        }

        async function searchTwitchCategory(auto = false) {
            const resultsBox = document.getElementById('categoryResults');

            if (!twitchCreds.clientId || !twitchCreds.token) {
                if (!auto) resultsBox.textContent = 'Lisää ensin Twitchin Client-ID ja Access Token yläpuolelle.';
                return;
            }

            let query;
            if (auto) {
                query = lastCategoryQuery;
                if (!query) return;
            } else {
                query = document.getElementById('categoryInput').value.trim();
                if (!query) return;
                addToCategoryHistory(query);
                lastCategoryQuery = query;
                resultsBox.textContent = 'Haetaan...';
            }

            try {
                const gameRes = await fetch(`https://api.twitch.tv/helix/games?name=${encodeURIComponent(query)}`, {
                    headers: { 'Client-Id': twitchCreds.clientId, 'Authorization': `Bearer ${twitchCreds.token}` }
                });
                if (!gameRes.ok) throw new Error('Kategoriahaku epäonnistui (HTTP ' + gameRes.status + ')');
                const gameData = await gameRes.json();
                if (!gameData.data || gameData.data.length === 0) {
                    if (!auto) resultsBox.textContent = 'Kategoriaa ei löytynyt (huom: Twitch vaatii tarkan nimen, esim. "Just Chatting").';
                    return;
                }
                const gameId = gameData.data[0].id;

                const streamsRes = await fetch(`https://api.twitch.tv/helix/streams?game_id=${gameId}&first=30`, {
                    headers: { 'Client-Id': twitchCreds.clientId, 'Authorization': `Bearer ${twitchCreds.token}` }
                });
                if (!streamsRes.ok) throw new Error('Striimihaku epäonnistui (HTTP ' + streamsRes.status + ')');
                const streamsData = await streamsRes.json();

                resultsBox.innerHTML = '';

                const activeLogins = slots.map(s => s.dataset.name).filter(Boolean).map(n => n.toLowerCase());
                const filtered = (streamsData.data || []).filter(s =>
                    s.viewer_count >= 5 && !activeLogins.includes(s.user_login.toLowerCase())
                );

                if (filtered.length === 0) {
                    resultsBox.textContent = 'Ei uusia (≥5 katsojaa, ei jo playerissa) livenä olevia striimejä juuri nyt.';
                    return;
                }

                filtered.forEach(s => {
                    const login = s.user_login.toLowerCase();

                    // Esiladataan iso esikatselukuva heti, jotta hover-vaihto muihin kuviin näkyy välittömästi
                    const preloadImg = new Image();
                    preloadImg.src = s.thumbnail_url.replace('{width}', '320').replace('{height}', '180');

                    // <a>-elementti: tavallinen klikkaus lataa playeriin, keski-/ctrl-klikkaus
                    // avaa Twitch-kanavan uuteen välilehteen selaimen omalla natiivilla toiminnolla
                    const item = document.createElement('a');
                    item.className = 'saved-channel';
                    item.href = `https://www.twitch.tv/${login}`;
                    item.target = '_blank';
                    item.rel = 'noopener noreferrer';
                    item.addEventListener('click', (e) => {
                        if (e.button === 0 && !e.ctrlKey && !e.metaKey && !e.shiftKey) {
                            e.preventDefault();
                            const loaded = loadFromCategorySearch(login, 'twitch');
                            if (loaded) item.remove();
                        }
                    });

                    const left = document.createElement('span');
                    left.className = 'left-group';

                    const smallThumbUrl = s.thumbnail_url.replace('{width}', '80').replace('{height}', '45');
                    const bigThumbUrl = s.thumbnail_url.replace('{width}', '320').replace('{height}', '180');

                    const thumb = document.createElement('img');
                    thumb.className = 'stream-thumb';
                    thumb.src = smallThumbUrl;
                    thumb.alt = '';
                    thumb.loading = 'lazy';
                    thumb.addEventListener('mouseenter', (e) => showThumbPreview(e, bigThumbUrl));
                    thumb.addEventListener('mouseleave', hideThumbPreview);
                    left.appendChild(thumb);

                    left.appendChild(createPlatformBadge('twitch'));

                    const dot = document.createElement('span');
                    dot.className = 'status-dot live';
                    left.appendChild(dot);

                    const nameSpan = document.createElement('span');
                    nameSpan.className = 'name-text';
                    nameSpan.textContent = `${s.user_name} (${s.viewer_count.toLocaleString('fi-FI')})`;
                    left.appendChild(nameSpan);

                    item.appendChild(left);
                    resultsBox.appendChild(item);
                });
            } catch (err) {
                if (!auto) resultsBox.textContent = 'Virhe: ' + err.message + ' (tarkista Client-ID/Token)';
                else console.warn('Automaattinen kategoriapäivitys epäonnistui:', err.message);
            }
        }

        async function refreshTwitchLiveStatus(silent = false) {
            if (!twitchCreds.clientId || !twitchCreds.token) {
                if (!silent) alert('Lisää ensin Twitchin Client-ID ja Access Token yllä.');
                return;
            }
            const twitchLogins = savedChannels.filter(c => c.plat === 'twitch').map(c => c.name);
            if (twitchLogins.length === 0) return;

            const chunks = [];
            for (let i = 0; i < twitchLogins.length; i += 100) chunks.push(twitchLogins.slice(i, i + 100));

            const liveInfo = new Map();
            try {
                for (const chunk of chunks) {
                    const params = chunk.map(n => `user_login=${encodeURIComponent(n)}`).join('&');
                    const res = await fetch(`https://api.twitch.tv/helix/streams?first=100&${params}`, {
                        headers: { 'Client-Id': twitchCreds.clientId, 'Authorization': `Bearer ${twitchCreds.token}` }
                    });
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    const data = await res.json();
                    data.data.forEach(s => liveInfo.set(s.user_login.toLowerCase(), { viewerCount: s.viewer_count, gameName: s.game_name || '' }));
                }
                savedChannels.forEach(c => {
                    if (c.plat === 'twitch') {
                        const info = liveInfo.get(c.name.toLowerCase());
                        c.isLive = info !== undefined;
                        c.viewerCount = info !== undefined ? info.viewerCount : null;
                        c.gameName = info !== undefined ? info.gameName : null;
                    }
                });
                persistSavedChannels();
                renderSavedList();
                if (autoFillEnabled) runAutoFill();
            } catch (err) {
                if (!silent) {
                    alert('Live-tilan haku epäonnistui: ' + err.message + '\n\nTarkista Client-ID ja Access Token.');
                } else {
                    console.warn('Automaattinen live-tilan päivitys epäonnistui:', err.message);
                }
            }
        }

        // ---------- Automaattinen päivitys: kytkin + sekuntilaskuri ----------

        function updateAutoRefreshUI() {
            const countdownEl = document.getElementById('autoRefreshCountdown');
            if (countdownEl) {
                countdownEl.textContent = autoRefreshEnabled ? (autoRefreshSecondsLeft + ' s') : 'Pois päältä';
            }
        }

        function onAutoRefreshToggleChange() {
            autoRefreshEnabled = document.getElementById('autoRefreshToggle').checked;
            localStorage.setItem('autoRefreshEnabled', autoRefreshEnabled);
            if (autoRefreshEnabled) autoRefreshSecondsLeft = 120;
            updateAutoRefreshUI();
        }

        async function runAutoRefreshCycle() {
            if (twitchCreds.clientId && twitchCreds.token) {
                await refreshTwitchLiveStatus(true);
                if (lastCategoryQuery) await searchTwitchCategory(true);
            }
        }

        setInterval(() => {
            if (!autoRefreshEnabled) return;
            autoRefreshSecondsLeft--;
            if (autoRefreshSecondsLeft <= 0) {
                runAutoRefreshCycle();
                autoRefreshSecondsLeft = 120;
            }
            updateAutoRefreshUI();
        }, 1000);

        // ---------- Asetusten vienti / tuonti ----------

        function exportSettings() {
            const data = {
                version: 2,
                exportedAt: new Date().toISOString(),
                myChannels: JSON.parse(localStorage.getItem('myChannels') || '[]'),
                twitchCreds: JSON.parse(localStorage.getItem('twitchCreds') || 'null'),
                categoryHistory: JSON.parse(localStorage.getItem('categoryHistory') || '[]'),
                gridMode: localStorage.getItem('gridMode'),
                activeLayout: JSON.parse(localStorage.getItem('activeLayout') || 'null'),
                visualOrder: JSON.parse(localStorage.getItem('visualOrder') || 'null'),
                autoRefreshEnabled: localStorage.getItem('autoRefreshEnabled'),
                autoFillEnabled: localStorage.getItem('autoFillEnabled'),
                categoryFilterEnabled: localStorage.getItem('categoryFilterEnabled'),
                boxHeight_active: localStorage.getItem('boxHeight_active'),
                boxHeight_twitch: localStorage.getItem('boxHeight_twitch'),
                boxHeight_kick: localStorage.getItem('boxHeight_kick')
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'multistream-theater-asetukset.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function triggerImportFile() {
            document.getElementById('importFileInput').click();
        }

        function importSettings(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.myChannels !== undefined) localStorage.setItem('myChannels', JSON.stringify(data.myChannels));
                    if (data.twitchCreds) localStorage.setItem('twitchCreds', JSON.stringify(data.twitchCreds));
                    if (data.categoryHistory !== undefined) localStorage.setItem('categoryHistory', JSON.stringify(data.categoryHistory));
                    if (data.gridMode) localStorage.setItem('gridMode', data.gridMode);
                    if (data.activeLayout) localStorage.setItem('activeLayout', JSON.stringify(data.activeLayout));
                    if (data.visualOrder) localStorage.setItem('visualOrder', JSON.stringify(data.visualOrder));
                    if (data.autoRefreshEnabled !== undefined && data.autoRefreshEnabled !== null) localStorage.setItem('autoRefreshEnabled', data.autoRefreshEnabled);
                    if (data.autoFillEnabled !== undefined && data.autoFillEnabled !== null) localStorage.setItem('autoFillEnabled', data.autoFillEnabled);
                    if (data.categoryFilterEnabled !== undefined && data.categoryFilterEnabled !== null) localStorage.setItem('categoryFilterEnabled', data.categoryFilterEnabled);
                    if (data.boxHeight_active) localStorage.setItem('boxHeight_active', data.boxHeight_active);
                    if (data.boxHeight_twitch) localStorage.setItem('boxHeight_twitch', data.boxHeight_twitch);
                    if (data.boxHeight_kick) localStorage.setItem('boxHeight_kick', data.boxHeight_kick);
                    alert('Asetukset tuotu onnistuneesti. Sivu ladataan uudelleen.');
                    location.reload();
                } catch (err) {
                    alert('Tiedoston lukeminen epäonnistui: virheellinen JSON-tiedosto.');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // ---------- Käynnistys ----------

        document.getElementById('twitchClientId').value = twitchCreds.clientId || '';
        document.getElementById('twitchToken').value = twitchCreds.token || '';
        document.getElementById('autoRefreshToggle').checked = autoRefreshEnabled;
        document.getElementById('autoFillToggle').checked = autoFillEnabled;
        document.getElementById('categoryFilterToggle').checked = categoryFilterEnabled;
        renderCategoryHistory();
        updateAddButtonColor();
        updateAutoRefreshUI();
        initSlots();
        setupResizablePersistence('activeContent', 'boxHeight_active');
        setupResizablePersistence('twitchListWrap', 'boxHeight_twitch');
        setupResizablePersistence('kickListWrap', 'boxHeight_kick');
        if (twitchCreds.clientId && twitchCreds.token) refreshTwitchLiveStatus(true);
    </script>
</body>
</html>
